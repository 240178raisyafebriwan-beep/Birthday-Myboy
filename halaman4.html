<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Quicksand', sans-serif;
            color: #ffffff;
            overflow: hidden;
        }

        /* Latar Belakang Love Berjatuhan */
        .heart {
            position: absolute;
            color: #ff7eb9;
            font-size: 20px;
            z-index: 1;
            user-select: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        .container {
            width: 85%;
            max-width: 550px;
            background: rgba(20, 20, 20, 0.8);
            padding: 30px;
            border-radius: 30px;
            border: 2px solid #ff7eb9;
            box-shadow: 0 0 25px rgba(255, 126, 185, 0.6);
            z-index: 10;
            position: relative;
            backdrop-filter: blur(5px);
            text-align: center; /* Memastikan tombol di tengah */
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: #ff7eb9;
            font-size: 32px;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 126, 185, 0.8);
        }

        #text-container {
            font-size: 17px;
            line-height: 1.6;
            color: #fce4ec;
            text-align: left;
            min-height: 200px; 
            margin-bottom: 20px;
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 18px;
            background-color: #ff7eb9;
            margin-left: 5px;
            animation: blink 0.6s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        /* Styling Tombol Kembali */
        #btn-kembali {
            display: none; /* Sembunyi di awal */
            opacity: 0;
            background-color: transparent;
            color: #ff7eb9;
            border: 2px solid #ff7eb9;
            padding: 10px 25px;
            font-family: 'Quicksand', sans-serif;
            font-weight: 600;
            font-size: 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            box-shadow: 0 0 10px rgba(255, 126, 185, 0.2);
            animation: fadeIn 1s forwards; /* Efek muncul halus */
        }

        #btn-kembali:hover {
            background-color: #ff7eb9;
            color: #000;
            box-shadow: 0 0 20px rgba(255, 126, 185, 0.6);
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Selamat ulang tahun, sayangku 💖</h1>
        <div id="text-container">
            <span id="typewriter"></span><span class="cursor" id="cursor"></span>
        </div>
        
        <a href="index.html" id="btn-kembali">Kembali ke Awal</a>
    </div>

    <script>
        const text = `Aku sangat bersyukur memiliki kamu dalam hidupku. Terima kasih telah menjadi pribadi yang luar biasa—baik hati, penyabar, penuh kasih sayang, dan selalu membuat segalanya terasa lebih hangat hanya dengan kehadiranmu.

Semoga bertambahnya umur kamu membawa kebahagiaan, kedamaian, dan semua kebaikan yang selama ini kamu harapkan. Semoga setiap langkahmu terasa lebih ringan, dan semoga kamu selalu dikelilingi oleh cinta dan orang-orang yang benar-benar peduli padamu. Kamu pantas mendapatkan lebih dari yang kamu sadari.

Aku bersyukur bertemu kamu dan semoga juga banyak hari-hari setelahnya. Aku berharap bisa menciptakan lebih banyak kenangan bersamamu, tumbuh bersama, dan mencintaimu dengan cara-cara sederhana yang paling berarti. Selamat ulang tahun!`;

        let i = 0;
        const speed = 40; 
        const target = document.getElementById("typewriter");
        const cursor = document.getElementById("cursor");
        const btnKembali = document.getElementById("btn-kembali");

        function typeWriter() {
            if (i < text.length) {
                if (text.charAt(i) === "\n") {
                    target.innerHTML += "<br><br>";
                } else {
                    target.innerHTML += text.charAt(i);
                }
                i++;
                setTimeout(typeWriter, speed);
            } else {
                // Saat selesai mengetik:
                cursor.style.display = "none"; // Sembunyikan kursor
                btnKembali.style.display = "inline-block"; // Munculkan tombol
            }
        }

        function createHeart() {
            const heart = document.createElement("div");
            heart.classList.add("heart");
            heart.innerHTML = "❤️"; 
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = Math.random() * 3 + 2 + "s"; 
            heart.style.opacity = Math.random();
            heart.style.fontSize = Math.random() * 20 + 10 + "px";
            
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 5000);
        }

        window.onload = () => {
            typeWriter();
            setInterval(createHeart, 300);
        };
    </script>
</body>
</html>
