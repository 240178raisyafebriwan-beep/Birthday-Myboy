<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>For You</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: radial-gradient(circle at center, #0a0a1f, #000);
            overflow: hidden;
            color: white;
        }

        /* BINTANG */
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            opacity: 0.5;
        }

        /* CONTAINER KATA-KATA ESTETIK ATAS */
        #extra-words {
            position: absolute;
            top: 5%; 
            width: 100%;
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            font-style: italic;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.6);
            opacity: 0;
            transition: 2s ease-in-out;
            z-index: 10;
        }

        /* TEXT UTAMA */
        #note {
            position: absolute;
            top: 20%;
            width: 100%;
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            opacity: 0;
            transform: translateY(10px);
            transition: 1s;
            text-shadow: 0 0 10px rgba(255,255,255,0.3), 0 0 25px rgba(255,105,180,0.4);
        }

        /* POLAROID */
        #card {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-6deg) scale(0.9);
            width: 200px;
            height: 260px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            cursor: pointer;
            transition: 0.4s;
            z-index: 50;
        }

        #card img {
            width: 100%;
            height: 75%;
            object-fit: cover;
            border-radius: 12px 12px 0 0;
        }

        #card .caption {
            height: 25%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #555;
        }

        #card:hover {
            transform: translate(-50%, -50%) rotate(0deg) scale(1);
        }

        /* LOVE FOTO CONTAINER */
        #photo {
            position: absolute;
            top: 50%; /* Diubah dari 58% ke 50% supaya naik ke atas */
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 420px;
            height: 340px;
            transition: 0.6s;
        }

        /* FOTO SATUAN */
        .pic {
            position: absolute;
            width: 75px;
            height: 75px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 12px rgba(255,255,255,0.7), 0 0 25px rgba(255,105,180,0.6);
            opacity: 0;
            transform: scale(0.5); /* Mulai dari kecil */
            transition: opacity 0.5s, transform 0.5s; /* Transisi manual gantiin animasi pop */
        }

        .pic img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* CLASS SAAT FOTO MUNCUL */
        .pic.show {
            opacity: 1;
            transform: scale(1);
        }

        /* ANIMASI FLOATING (MELAYANG) */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        /* POSISI HATI 10 FOTO */
        .p1 { top: 20px;  left: 65px; }
        .p10 { top: 60px; left: 150px; } /* Lembah Tengah */
        .p2 { top: 20px;  left: 235px; }
        .p3 { top: 85px;  left: 5px; }
        .p4 { top: 85px;  left: 295px; }
        .p5 { top: 170px; left: 25px; }
        .p6 { top: 170px; left: 275px; }
        .p7 { top: 245px; left: 70px; }
        .p8 { top: 245px; left: 230px; }
        .p9 { top: 310px; left: 150px; }

        /* TOMBOL NEXT */
        #next-btn {
            position: absolute;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%) scale(0);
            padding: 12px 30px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-family: 'Playfair Display', serif;
            border-radius: 25px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: 0.5s;
            z-index: 100;
        }

        #next-btn:hover {
            background: white;
            color: black;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>

    <div id="extra-words">"Every picture tells a story, and you are my favorite one."</div>

    <div id="note">i kept these memories for you ✨</div>

    <button id="next-btn" onclick="nextPage()">Next Page →</button>

    <div id="card">
        <img src="foto.jpg"> <div class="caption">tap to open</div>
    </div>

    <div id="photo">
        <div class="pic p1"><img src="foto1.jpg"></div>
        <div class="pic p10"><img src="foto10.jpg"></div>
        <div class="pic p2"><img src="foto2.jpg"></div>
        <div class="pic p3"><img src="foto3.jpg"></div>
        <div class="pic p4"><img src="foto4.jpg"></div>
        <div class="pic p5"><img src="foto5.jpg"></div>
        <div class="pic p6"><img src="foto6.jpg"></div>
        <div class="pic p7"><img src="foto7.jpg"></div>
        <div class="pic p8"><img src="foto8.jpg"></div>
        <div class="pic p9"><img src="foto9.jpg"></div>
    </div>

    <script>
        // GENERATE BINTANG
        for (let i = 0; i < 100; i++) {
            let star = document.createElement("div");
            star.className = "star";
            star.style.left = Math.random() * 100 + "vw";
            star.style.top = Math.random() * 100 + "vh";
            document.body.appendChild(star);
        }

        // MUNCULKAN TEXT AWAL
        setTimeout(() => {
            document.getElementById("note").style.opacity = 1;
        }, 600);

        const card = document.getElementById("card");
        const photo = document.getElementById("photo");
        const pics = document.querySelectorAll(".pic");
        const nextBtn = document.getElementById("next-btn");
        const extraWords = document.getElementById("extra-words");

        // LOGIKA KLIK KARTU
        card.onclick = () => {
            // Sembunyikan kartu & Munculkan container foto
            card.style.transform = "translate(-50%, -50%) scale(0)";
            photo.style.transform = "translate(-50%, -50%) scale(1)";

            // Munculkan foto satu per satu secara bergantian (Sequence)
            pics.forEach((pic, i) => {
                // TAHAP 1: Foto muncul (pop in)
                setTimeout(() => {
                    pic.classList.add("show");
                    
                    // TAHAP 2: Setelah foto selesai muncul (500ms), baru aktifkan floating
                    // Ini kunci agar fotonya tidak hilang/berkedip
                    setTimeout(() => {
                        pic.style.animation = "float 3s ease-in-out infinite";
                    }, 500); 

                }, i * 180); // Jeda antar foto sedikit dilambatin biar estetik
            });

            // Munculkan Kata-kata Estetik
            setTimeout(() => {
                extraWords.style.opacity = 1;
                extraWords.style.top = "12%";
            }, 1500);

            // Munculkan Tombol Next terakhir setelah semua foto muncul
            setTimeout(() => {
                nextBtn.style.transform = "translateX(-50%) scale(1)";
            }, 3500);
        };

        // PINDAH HALAMAN
        function nextPage() {
            window.location.href = "halaman3.html"; // Pastikan file ini ada
        }
    </script>
</body>
</html>
