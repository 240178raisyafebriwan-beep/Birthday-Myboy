<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday Project</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: 'Quicksand', sans-serif;
}

canvas { display: block; position: absolute; top: 0; left: 0; }

/* PANEL PASSWORD */
#pass-container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 320px;
    background: rgba(20, 20, 20, 0.9);
    padding: 30px;
    border-radius: 30px;
    text-align: center;
    box-shadow: 0 0 30px rgba(255, 126, 185, 0.4);
    border: 1px solid #ff7eb9;
    z-index: 100;
    backdrop-filter: blur(10px);
}

.pass-header img { width: 80px; margin-bottom: 10px; }
.pass-header h2 { color: #ff7eb9; font-size: 18px; margin: 10px 0; text-shadow: 0 0 10px rgba(255,126,185,0.5); }

.dots { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
.dot { width: 12px; height: 12px; border: 2px solid #ff7eb9; border-radius: 50%; transition: 0.3s; }
.dot.filled { background: #ff7eb9; box-shadow: 0 0 10px #ff7eb9; }

.keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
.key {
    background: rgba(255, 126, 185, 0.1);
    padding: 15px;
    border-radius: 15px;
    font-size: 20px;
    font-weight: bold;
    color: #ffffff;
    cursor: pointer;
    transition: 0.2s;
    border: 1px solid rgba(255, 126, 185, 0.3);
}
.key:active { background: #ff7eb9; color: black; transform: scale(0.9); }

/* COUNTDOWN */
#count {
    position: absolute;
    width: 100%;
    top: 40%;
    text-align: center;
    font-size: 140px;
    font-weight: bold;
    color: #ffffff;
    z-index: 10;
    display: none;
    text-shadow: 0 0 15px #fff, 0 0 30px #ff4da6;
}

/* TEXT UTAMA */
#title {
    position: absolute;
    width: 100%;
    top: 35%; /* Naik sedikit agar tidak tertutup hati */
    text-align: center;
    font-size: 50px;
    font-weight: bold;
    color: #fff;
    opacity: 0;
    z-index: 10;
    text-shadow: 0 0 20px #ff4da6;
    transition: 0.8s ease;
}

/* KONTAINER HATI DI BAWAH */
#love-container {
    position: absolute;
    width: 100%;
    top: 65%; /* POSISI DITURUNKAN KE BAWAH */
    text-align: center;
    display: none;
    z-index: 1000;
}

/* HATI WARNA HITAM */
#love { 
    font-size: 120px; 
    color: #000000; /* WARNA HITAM */
    text-decoration: none; 
    animation: pulse 1s infinite; 
    display: inline-block;
    /* Shadow pink tipis agar hati hitam tetap terlihat di background hitam */
    text-shadow: 0 0 10px #ff7eb9, 0 0 20px #ff7eb9; 
}

@keyframes pulse { 0%, 100% {transform: scale(1);} 50% {transform: scale(1.1);} }
</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="pass-container">
    <div class="pass-header">
        <img src="https://media.tenor.com/On7tS97Wmo8AAAAi/pixel-cat.gif" alt="cat">
        <h2>Masukkan Password<br>untuk Membuka Hadiah</h2>
    </div>
    <div class="dots">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
    <div class="keypad">
        <div class="key" onclick="press(1)">1</div><div class="key" onclick="press(2)">2</div><div class="key" onclick="press(3)">3</div>
        <div class="key" onclick="press(4)">4</div><div class="key" onclick="press(5)">5</div><div class="key" onclick="press(6)">6</div>
        <div class="key" onclick="press(7)">7</div><div class="key" onclick="press(8)">8</div><div class="key" onclick="press(9)">9</div>
        <div></div><div class="key" onclick="press(0)">0</div><div class="key back" onclick="del()">⌫</div>
    </div>
</div>

<div id="count">3</div>

<div id="title"></div>
<div id="love-container">
    <a href="halaman2.html" id="love">❤</a>
    <p style="color:white; margin-top:10px; letter-spacing:3px; font-weight: bold;">TEKAN HATINYA</p>
</div>

<script>
// ===== BG MATRIX PINK =====
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const drops = [];
for (let i = 0; i < 50; i++) drops[i] = Math.random() * canvas.height;

function draw() {
    ctx.fillStyle = "rgba(0,0,0,0.1)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.font = "15px monospace";
    ctx.fillStyle = "#ff4da6";
    for (let i = 0; i < drops.length; i++) {
        ctx.fillText("HBD", i * 30, drops[i]);
        drops[i] += 2;
        if (drops[i] > canvas.height) drops[i] = 0;
    }
}
setInterval(draw, 33);

// ===== PASSWORD LOGIC =====
const correctPass = "140506"; 
let inputPass = "";
const dots = document.querySelectorAll(".dot");

function press(num) {
    if (inputPass.length < 6) {
        inputPass += num;
        updateDots();
        if (inputPass.length === 6) {
            if (inputPass === correctPass) {
                document.getElementById("pass-container").style.display = "none";
                startCountdown();
            } else {
                inputPass = "";
                setTimeout(updateDots, 300);
                alert("Password Salah!");
            }
        }
    }
}

function del() { inputPass = inputPass.slice(0, -1); updateDots(); }
function updateDots() {
    dots.forEach((dot, index) => {
        if (index < inputPass.length) dot.classList.add("filled");
        else dot.classList.remove("filled");
    });
}

// ===== COUNTDOWN & TEXT LOGIC =====
function startCountdown() {
    const countEl = document.getElementById("count");
    countEl.style.display = "block";
    let timeLeft = 3;
    
    const timer = setInterval(() => {
        timeLeft--;
        if (timeLeft > 0) {
            countEl.innerHTML = timeLeft;
        } else {
            clearInterval(timer);
            countEl.style.display = "none";
            showMessages();
        }
    }, 1000);
}

const messages = ["HAPPY", "BIRTHDAY", "TO", "MY BOYFRIEND", "I LOVE YOU!"];
let msgIdx = 0;

function showMessages() {
    const titleEl = document.getElementById("title");
    if (msgIdx < messages.length) {
        titleEl.style.opacity = 0;
        setTimeout(() => {
            titleEl.innerHTML = messages[msgIdx];
            titleEl.style.opacity = 1;
            msgIdx++;
            setTimeout(showMessages, 1500);
        }, 400);
    } else {
        document.getElementById("love-container").style.display = "block";
    }
}
</script>

</body>
</html>
